apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nourishiq-backend
  labels:
    cloud.googleapis.com/location: asia-south1
spec:
  template:
    spec:
      containers:
      - image: gcr.io/PROJECT_ID/nourishiq-backend # Replace PROJECT_ID
        ports:
        - containerPort: 8000
        env:
        - name: GEMINI_API_KEY
          value: "YOUR_API_KEY_HERE" # In production, use Secret Manager reference
